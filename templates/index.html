<!DOCTYPE html>
<html lang="bn" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>প্রোডাক্টিভ রমাদান ২.০ কুইজ প্রতিযোগিতা | DIU</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    :root {
      --ramadan-green: #14532d;
      --ramadan-gold: #d4a017;
      --ramadan-dark: #0f172a;
      --ramadan-light: #f8fafc;
    }

    * { margin:0; padding:0; box-sizing:border-box; }

    body {
      font-family: 'Hind Siliguri', sans-serif;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: var(--ramadan-light);
      min-height: 100vh;
      line-height: 1.6;
    }

    .container {
      max-width: 900px;
      margin: 0 auto;
      padding: 20px;
    }

    .banner {
      width: 100%;
      height: 220px;
      object-fit: cover;
      border-radius: 12px;
      margin: 20px 0 30px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
      border: 2px solid var(--ramadan-gold);
    }

    h1, h2 {
      color: var(--ramadan-gold);
      text-align: center;
      margin-bottom: 1rem;
    }

    .card {
      background: rgba(30, 41, 59, 0.92);
      border-radius: 16px;
      padding: 2rem;
      margin-bottom: 2rem;
      box-shadow: 0 8px 32px rgba(0,0,0,0.4);
    }

    .form-group {
      margin-bottom: 1.3rem;
    }

    label {
      display: block;
      margin-bottom: 0.5rem;
      font-weight: 500;
    }

    input {
      width: 100%;
      padding: 12px;
      border-radius: 8px;
      border: 1px solid #4b5563;
      background: #1e293b;
      color: white;
      font-size: 1rem;
    }

    button {
      background: var(--ramadan-green);
      color: white;
      border: none;
      padding: 14px 32px;
      font-size: 1.2rem;
      border-radius: 10px;
      cursor: pointer;
      font-weight: 600;
      transition: background 0.2s;
    }

    button:hover {
      background: #166534;
    }

    .btn-start {
      background: var(--ramadan-gold);
      color: #0f172a;
      font-size: 1.4rem;
      padding: 18px 60px;
      margin: 2rem auto;
      display: block;
    }

    .timer {
      font-size: 2.8rem;
      font-weight: bold;
      color: var(--ramadan-gold);
      text-align: center;
      margin: 1.5rem 0;
      padding: 15px;
      border-radius: 12px;
      background: rgba(20,83,45,0.4);
      border: 2px solid var(--ramadan-green);
    }

    .question {
      margin: 2rem 0;
      padding: 1.5rem;
      background: rgba(20,83,45,0.25);
      border-radius: 10px;
      border-left: 5px solid var(--ramadan-gold);
    }

    .question strong {
      color: var(--ramadan-gold);
      font-size: 1.3rem;
    }

    .options {
      display: flex;
      flex-direction: column;
      gap: 0.8rem;
      margin-top: 1rem;
    }

    .option-label {
      background: #1e293b;
      padding: 14px;
      border-radius: 10px;
      cursor: pointer;
      border: 2px solid transparent;
      transition: all 0.2s;
    }

    .option-label:hover {
      border-color: var(--ramadan-gold);
      background: #253549;
    }

    input[type="radio"] {
      margin-left: 12px;
      accent-color: var(--ramadan-gold);
    }

    .result-card {
      text-align: center;
    }

    .score-big {
      font-size: 6rem;
      font-weight: bold;
      color: var(--ramadan-gold);
      margin: 1rem 0;
    }

    .stats {
      display: flex;
      justify-content: center;
      gap: 3rem;
      flex-wrap: wrap;
      margin: 2rem 0;
    }

    .stat-box {
      background: rgba(20,83,45,0.4);
      padding: 1.8rem 3rem;
      border-radius: 12px;
      border: 1px solid var(--ramadan-green);
      font-size: 1.3rem;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 1.5rem;
      background: #0f172a;
      border-radius: 12px;
      overflow: hidden;
    }

    th, td {
      padding: 14px;
      text-align: right;
    }

    th {
      background: var(--ramadan-green);
      color: white;
    }

    tr:nth-child(even) {
      background: rgba(255,255,255,0.04);
    }

    .highlight-1 { background: rgba(212,160,23,0.15); }
    .highlight-2 { background: rgba(203,213,225,0.12); }
    .highlight-3 { background: rgba(156,163,175,0.12); }

    .section-title {
      color: var(--ramadan-gold);
      border-bottom: 2px solid var(--ramadan-gold);
      padding-bottom: 0.6rem;
      margin: 2.5rem 0 1.5rem;
      text-align: center;
    }

    .hidden {
      display: none !important;
    }

    @media (max-width: 768px) {
      .banner { height: 160px; }
      .score-big { font-size: 4rem; }
      .stats { flex-direction: column; align-items: center; gap: 1.5rem; }
    }
  </style>
</head>
<body>

<div class="container">

  <img src="https://images.unsplash.com/photo-1581092160560-1c1e428e9d65?w=1200" 
       alt="Ramadan Banner" class="banner">

  <h1>প্রোডাক্টিভ রমাদান - ২.০</h1>
  <h2>কুইজ প্রতিযোগিতা</h2>

  <p style="text-align:center; color:#94a3b8; margin:1.5rem 0 2.5rem;">
    আয়োজনে: ঢাকা ইন্টারন্যাশনাল ইউনিভার্সিটি<br>
    সহযোগিতায়: ডিআইইউ মুসলিমস কমিউনিটি
  </p>

  <!-- Home -->
  <div id="home" class="card">
    <div style="text-align:center;">
      <button class="btn-start" onclick="show('registration')">কুইজে অংশগ্রহণ করুন</button>
      <button style="margin-left:1.5rem; background:#334155;" onclick="show('ranking')">র‍্যাঙ্কিং দেখুন</button>
    </div>
  </div>

  <!-- Registration -->
  <div id="registration" class="card hidden">
    <h2 class="section-title">অংশগ্রহণের তথ্য দিন</h2>
    <form id="regForm">
      <div class="form-group">
        <label for="name">নাম *</label>
        <input type="text" id="name" required>
      </div>
      <div class="form-group">
        <label for="dept">বিভাগ *</label>
        <input type="text" id="dept" required placeholder="যেমন: CSE, BBA, English...">
      </div>
      <div class="form-group">
        <label for="email">ইমেইল *</label>
        <input type="email" id="email" required>
      </div>
      <button type="submit" class="btn-start">কুইজ শুরু করুন</button>
    </form>
  </div>

  <!-- Quiz - All questions on one page -->
  <div id="quiz" class="card hidden">
    <div class="timer" id="timer">সময় বাকি: ০৮:০০</div>

    <div id="questionsContainer"></div>

    <div style="text-align:center; margin-top:3rem;">
      <button id="submitBtn" style="background:#991b1b; font-size:1.4rem; padding:18px 60px;">
        কুইজ জমা দিন
      </button>
    </div>
  </div>

  <!-- Result -->
  <div id="result" class="card hidden">
    <h2 class="section-title">আপনার ফলাফল</h2>
    <div class="score-big" id="scoreDisplay">0.00</div>

    <div class="stats">
      <div class="stat-box">সঠিক <span id="correctCount">0</span></div>
      <div class="stat-box">ভুল <span id="wrongCount">0</span></div>
      <div class="stat-box">এড়ানো <span id="skipCount">0</span></div>
    </div>

    <p style="text-align:center; font-size:1.4rem; margin:2rem 0;">
      সময় নিয়েছেন: <strong id="timeTaken"></strong>
    </p>

    <div style="text-align:center; margin-top:2rem;">
      <button onclick="show('ranking')">র‍্যাঙ্কিং দেখুন</button>
      <button onclick="location.reload()" style="margin-left:1.5rem;">আবার চেষ্টা করুন</button>
    </div>
  </div>

  <!-- Ranking -->
  <div id="ranking" class="card hidden">
    <h2 class="section-title">লাইভ র‍্যাঙ্কিং</h2>
    <table>
      <thead>
        <tr>
          <th>র‍্যাঙ্ক</th>
          <th>নাম</th>
          <th>বিভাগ</th>
          <th>নম্বর</th>
          <th>সময়</th>
        </tr>
      </thead>
      <tbody id="rankBody"></tbody>
    </table>

    <div style="text-align:center; margin-top:2.5rem;">
      <button onclick="show('home')">হোমে ফিরুন</button>
    </div>
  </div>

</div>

<script>
// ──────────────────────────────────────────────
// Global state
// ──────────────────────────────────────────────
let questions = [];
let timerInterval;
let startTime;

// ──────────────────────────────────────────────
// Show / hide sections
// ──────────────────────────────────────────────
function show(id) {
  document.querySelectorAll('#home, #registration, #quiz, #result, #ranking')
    .forEach(el => el.classList.add('hidden'));
  document.getElementById(id).classList.remove('hidden');

  if (id === 'ranking') {
    loadLeaderboard();
  }
}

// ──────────────────────────────────────────────
// Load questions from backend
// ──────────────────────────────────────────────
fetch('/api/questions')
  .then(r => r.json())
  .then(data => {
    questions = data;
    renderAllQuestions();
  })
  .catch(err => {
    console.error("Failed to load questions:", err);
    alert("প্রশ্ন লোড করতে সমস্যা হয়েছে। পেজ রিফ্রেশ করুন।");
  });

// ──────────────────────────────────────────────
// Render all questions on one page
// ──────────────────────────────────────────────
function renderAllQuestions() {
  const container = document.getElementById('questionsContainer');
  container.innerHTML = '';

  questions.forEach((q, index) => {
    const questionDiv = document.createElement('div');
    questionDiv.className = 'question';
    questionDiv.innerHTML = `
      <strong>প্রশ্ন ${index + 1}/${questions.length}:</strong><br>
      ${q.q}
    `;

    const optionsDiv = document.createElement('div');
    optionsDiv.className = 'options';

    q.options.forEach((opt, i) => {
      const label = document.createElement('label');
      label.className = 'option-label';
      label.innerHTML = `
        <input type="radio" name="q${index}" value="${i}">
        ${String.fromCharCode(1072 + i)}) ${opt}
      `;
      optionsDiv.appendChild(label);
    });

    questionDiv.appendChild(optionsDiv);
    container.appendChild(questionDiv);
  });
}

// ──────────────────────────────────────────────
// Start 8-minute timer with auto-submit
// ──────────────────────────────────────────────
function startTimer() {
  let timeLeft = 8 * 60;

  const timerEl = document.getElementById('timer');

  const tick = () => {
    const min = Math.floor(timeLeft / 60);
    const sec = timeLeft % 60;
    timerEl.textContent = `সময় বাকি: ${min.toString().padStart(2,'0')}:${sec.toString().padStart(2,'0')}`;

    if (timeLeft <= 0) {
      clearInterval(timerInterval);
      submitQuiz(true);
    } else {
      timeLeft--;
    }
  };

  tick();
  timerInterval = setInterval(tick, 1000);
}

// ──────────────────────────────────────────────
// Submit answers (manual or timeout)
// ──────────────────────────────────────────────
async function submitQuiz(timeout = false) {
  clearInterval(timerInterval);

  let score = 0;
  let correct = 0;
  let wrong = 0;
  let skip = 0;

  for (let i = 0; i < questions.length; i++) {
    const selected = document.querySelector(`input[name="q${i}"]:checked`);
    const ans = selected ? parseInt(selected.value) : -1;

    if (ans === -1) skip++;
    else if (ans === questions[i].ans) { score += 1; correct++; }
    else { score -= 0.25; wrong++; }
  }

  const timeTakenSec = Math.floor((Date.now() - startTime) / 1000);
  const min = Math.floor(timeTakenSec / 60);
  const sec = timeTakenSec % 60;

  document.getElementById('scoreDisplay').textContent = score.toFixed(2);
  document.getElementById('correctCount').textContent = correct;
  document.getElementById('wrongCount').textContent = wrong;
  document.getElementById('skipCount').textContent = skip;
  document.getElementById('timeTaken').textContent = `${min} মিনিট ${sec} সেকেন্ড`;

  const payload = {
    name: localStorage.getItem('quizName') || 'Anonymous',
    dept: localStorage.getItem('quizDept') || '-',
    score,
    time_sec: timeTakenSec
  };

  try {
    await fetch('/api/submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload)
    });
  } catch (e) {
    console.error('Submit failed:', e);
  }

  show('result');
}

// ──────────────────────────────────────────────
// Load leaderboard
// ──────────────────────────────────────────────
async function loadLeaderboard() {
  try {
    const res = await fetch('/api/leaderboard');
    const data = await res.json();

    const tbody = document.getElementById('rankBody');
    tbody.innerHTML = '';

    data.forEach((item, i) => {
      const tr = document.createElement('tr');
      if (i === 0) tr.className = 'highlight-1';
      else if (i === 1) tr.className = 'highlight-2';
      else if (i === 2) tr.className = 'highlight-3';

      tr.innerHTML = `
        <td>${i+1}</td>
        <td>${item.name}</td>
        <td>${item.dept}</td>
        <td>${item.score.toFixed(2)}</td>
        <td>${item.time_display}</td>
      `;
      tbody.appendChild(tr);
    });
  } catch (e) {
    console.error('Leaderboard load failed:', e);
  }
}

// ──────────────────────────────────────────────
// Event listeners
// ──────────────────────────────────────────────
document.getElementById('regForm').addEventListener('submit', e => {
  e.preventDefault();

  const name = document.getElementById('name').value.trim();
  const dept = document.getElementById('dept').value.trim();
  const email = document.getElementById('email').value.trim();

  if (!name || !dept || !email) {
    return alert('সব তথ্য পূরণ করুন');
  }

  localStorage.setItem('quizName', name);
  localStorage.setItem('quizDept', dept);

  startTime = Date.now();
  show('quiz');
  startTimer();
});

document.getElementById('submitBtn').addEventListener('click', () => {
  if (confirm('কুইজ জমা দিতে চান?')) {
    submitQuiz();
  }
});

// Initial view
show('home');
</script>
</body>
</html>
